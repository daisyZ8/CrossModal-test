<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跨模态关联实验 - 错误重复版</title>
    <style>
        body { margin: 0; background-color: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        #start-btn { width: 120px; height: 120px; background-color: white; cursor: pointer; display: none; box-shadow: 0 0 20px rgba(255,255,255,0.2); z-index: 10; border-radius: 10px; }
        #choice-grid { display: none; grid-template-columns: repeat(3, 100px); grid-gap: 15px; }
        .stimulus-img { width: 90px; height: 90px; cursor: pointer; border: 3px solid transparent; border-radius: 8px; }
        #feedback { display: none; position: absolute; pointer-events: none; z-index: 20; }
        #feedback-img { width: 85px; height: 85px; }
        #status-text { position: absolute; top: 10%; color: #aaa; text-align: center; width: 90%; font-size: 16px; line-height: 1.5; }
        #loader { font-size: 24px; color: #55acee; font-weight: bold; margin-bottom: 20px; }
        
        .control-btn { position: fixed; padding: 10px 15px; background: #333; color: #888; border: 1px solid #444; border-radius: 5px; cursor: pointer; font-size: 13px; z-index: 30; }
        #exit-btn { bottom: 20px; right: 20px; border-color: #552222; }
        #phase-tag { position: absolute; top: 20px; left: 20px; font-size: 12px; color: #55acee; padding: 5px 10px; border: 1px solid #55acee; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="phase-tag">阶段 1：学习 (需连对5次)</div>
    <div id="status-text">正在准备实验资源...</div>
    <div id="loader">0%</div>
    
    <button id="exit-btn" class="control-btn" onclick="manualExit()">中途结束实验</button>
    
    <div id="start-btn"></div>
    <div id="choice-grid"></div>
    <div id="feedback"><img id="feedback-img" src="" alt="feedback"></div>

    <script>
        const audioPath = 'Auditory_Stimuli_Pure/'; 
        const imagePath = 'Visual_Stimuli_Balanced/';
        
        const stimuli = [
            { id: 1, name: 'S1_Circle_Blue' }, { id: 2, name: 'S2_Circle_Yellow' }, { id: 3, name: 'S3_Circle_Red' },
            { id: 4, name: 'S4_Square_Blue' }, { id: 5, name: 'S5_Square_Yellow' }, { id: 6, name: 'S6_Square_Red' },
            { id: 7, name: 'S7_Triangle_Blue' }, { id: 8, name: 'S8_Triangle_Yellow' }, { id: 9, name: 'S9_Triangle_Red' }
        ];

        let results = []; 
        let trialCount = 0;
        let consecutiveCorrect = 0; 
        let testPhaseCorrect = 0;   
        let isTestPhase = false;    
        
        const LEARNING_CRITERION = 5;  
        const TESTING_CRITERION = 10;  
        
        let repeatTarget = null; // 用于记录学习阶段需要重复的刺激
        
        let loadedCount = 0;
        const totalAssets = stimuli.length * 2 + 2; 
        let currentTarget = null;
        let showChoiceTime = 0;
        let audioContextUnlocked = false;

        function updateProgress() {
            loadedCount++;
            const percent = Math.round((loadedCount / totalAssets) * 100);
            document.getElementById('loader').innerText = percent + "%";
            if (percent >= 95 || loadedCount >= (stimuli.length + 2)) initExperiment();
        }

        function preload() {
            ['correct.png', 'incorrect.png'].forEach(src => {
                const img = new Image();
                img.onload = updateProgress; img.onerror = updateProgress;
                img.src = src;
            });
            stimuli.forEach(item => {
                const img = new Image();
                img.onload = updateProgress; img.onerror = updateProgress;
                img.src = `${imagePath}${item.name}.png`;
                const audio = new Audio();
                audio.oncanplaythrough = updateProgress; audio.onerror = updateProgress;
                audio.src = `${audioPath}${item.name}_Harm.wav`;
                audio.load();
            });
        }

        function initExperiment() {
            if (document.getElementById('start-btn').style.display === 'block') return;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('status-text').innerHTML = "资源就绪<br>点击白色方块开始试次";
        }

        function unlockAudio() {
            if (audioContextUnlocked) return;
            const silentAudio = new Audio();
            silentAudio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
            silentAudio.play().then(() => { audioContextUnlocked = true; }).catch(e => {});
        }

        const startBtn = document.getElementById('start-btn');
        const choiceGrid = document.getElementById('choice-grid');
        const feedback = document.getElementById('feedback');
        const feedbackImg = document.getElementById('feedback-img');
        const statusText = document.getElementById('status-text');
        const phaseTag = document.getElementById('phase-tag');

        startBtn.onclick = function() {
            unlockAudio();
            startBtn.style.display = 'none';
            
            // --- Error Repeat 逻辑 ---
            if (!isTestPhase && repeatTarget) {
                currentTarget = repeatTarget;
                statusText.innerText = "重新尝试刚才的刺激...";
            } else {
                currentTarget = stimuli[Math.floor(Math.random() * stimuli.length)];
                statusText.innerText = "聆听声音刺激...";
            }
            
            const audio = new Audio(`${audioPath}${currentTarget.name}_Harm.wav`);
            audio.play().catch(e => {
                startBtn.style.display = 'block';
            });

            audio.onended = () => {
                const delay = isTestPhase ? 5000 : 1000;
                statusText.innerText = `延迟期 (${delay/1000}s)`;
                setTimeout(() => { showChoices(); }, delay);
            };
        };

        function showChoices() {
            choiceGrid.innerHTML = '';
            statusText.innerText = "请选择对应的图形";
            const displayOrder = [...stimuli].sort(() => Math.random() - 0.5);
            displayOrder.forEach(item => {
                const img = document.createElement('img');
                img.src = `${imagePath}${item.name}.png`;
                img.className = 'stimulus-img';
                img.onclick = () => handleChoice(item.id, item.name);
                choiceGrid.appendChild(img);
            });
            choiceGrid.style.display = 'grid';
            showChoiceTime = performance.now();
        }

        function handleChoice(selectedId, selectedName) {
            const rt = Math.round(performance.now() - showChoiceTime);
            choiceGrid.style.display = 'none';
            const isCorrect = (selectedId === currentTarget.id);
            
            if (isCorrect) {
                feedbackImg.src = 'correct.png';
                if (!isTestPhase) {
                    consecutiveCorrect++;
                    repeatTarget = null; // 做对了，清空重复目标
                    if (consecutiveCorrect >= LEARNING_CRITERION) {
                        isTestPhase = true;
                        testPhaseCorrect = 0;
                        phaseTag.innerText = "阶段 2：测试 (需连对10次)";
                        phaseTag.style.color = "#ffcc00";
                        phaseTag.style.borderColor = "#ffcc00";
                    }
                } else {
                    testPhaseCorrect++;
                }
            } else {
                feedbackImg.src = 'incorrect.png';
                if (!isTestPhase) {
                    consecutiveCorrect = 0;
                    repeatTarget = currentTarget; // 学习阶段做错，记录当前目标下次重复
                } else {
                    testPhaseCorrect = 0;
                }
            }
            
            feedback.style.display = 'block';

            results.push({
                Trial: ++trialCount,
                Phase: isTestPhase ? "Testing" : "Learning",
                Target: currentTarget.name,
                Selected: selectedName,
                IsCorrect: isCorrect ? 1 : 0,
                IsRepeat: (!isTestPhase && repeatTarget && !isCorrect) ? "NextIsRepeat" : "No",
                PhaseConsec: isTestPhase ? testPhaseCorrect : consecutiveCorrect,
                RT_ms: rt
            });

            if (isTestPhase && testPhaseCorrect >= TESTING_CRITERION) {
                statusText.innerText = "测试完成，实验结束！";
                setTimeout(() => { exportToCSV(); }, 1000);
                return;
            }

            setTimeout(() => {
                feedback.style.display = 'none';
                startBtn.style.display = 'block';
                const countText = isTestPhase ? `测试进度: ${testPhaseCorrect}/${TESTING_CRITERION}` : `学习进度: ${consecutiveCorrect}/${LEARNING_CRITERION}`;
                statusText.innerText = `${countText} | 点击继续`;
            }, 2000); 
        }

        function manualExit() {
            if (confirm("确定要提前结束实验并导出当前数据吗？")) {
                if (results.length > 0) exportToCSV();
                else location.reload();
            }
        }

        function exportToCSV() {
            let csv = "\uFEFFTrial,Phase,Target,Selected,Correct,IsRepeat,PhaseConsec,RT_ms\n";
            results.forEach(r => {
                csv += `${r.Trial},${r.Phase},${r.Target},${r.Selected},${r.IsCorrect},${r.IsRepeat},${r.PhaseConsec},${r.RT_ms}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Exp_Data_${new Date().getTime()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => { location.reload(); }, 500);
        }

        window.onload = preload;
    </script>
</body>
</html>
