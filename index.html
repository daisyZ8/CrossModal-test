<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨模态关联实验 - 移动端优化版</title>
    <style>
        body { margin: 0; background-color: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        #start-btn { width: 120px; height: 120px; background-color: white; cursor: pointer; display: none; box-shadow: 0 0 20px rgba(255,255,255,0.2); z-index: 10; border-radius: 10px; }
        #choice-grid { display: none; grid-template-columns: repeat(3, 100px); grid-gap: 15px; }
        .stimulus-img { width: 90px; height: 90px; cursor: pointer; border: 3px solid transparent; border-radius: 8px; }
        #feedback { display: none; position: absolute; font-size: 100px; font-weight: bold; pointer-events: none; z-index: 20; }
        .correct { color: #4CAF50; }
        .incorrect { color: #F44336; }
        #status-text { position: absolute; top: 10%; color: #aaa; text-align: center; width: 90%; font-size: 16px; line-height: 1.5; }
        #loader { font-size: 24px; color: #55acee; font-weight: bold; margin-bottom: 20px; }
        #force-start { margin-top: 20px; padding: 10px 20px; background: #444; color: #888; border: none; border-radius: 5px; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div id="status-text">正在加载实验资源...<br>请确保网络连接稳定</div>
    <div id="loader">0%</div>
    <button id="force-start" onclick="forceStart()">网络太慢？强制进入</button>
    
    <div id="start-btn"></div>
    <div id="choice-grid"></div>
    <div id="feedback"></div>

    <script>
        const audioPath = 'Auditory_Stimuli_Harmonics/'; 
        const imagePath = 'Visual_Stimuli_Balanced/';
        
        const stimuli = [
            { id: 1, name: 'S1_Circle_Blue' }, { id: 2, name: 'S2_Circle_Yellow' }, { id: 3, name: 'S3_Circle_Red' },
            { id: 4, name: 'S4_Square_Blue' }, { id: 5, name: 'S5_Square_Yellow' }, { id: 6, name: 'S6_Square_Red' },
            { id: 7, name: 'S7_Triangle_Blue' }, { id: 8, name: 'S8_Triangle_Yellow' }, { id: 9, name: 'S9_Triangle_Red' }
        ];

        let results = []; 
        let trialCount = 0;
        let consecutiveCorrect = 0;
        const CRITERION = 20;
        
        let loadedCount = 0;
        const totalAssets = stimuli.length * 2;
        let currentTarget = null;
        let showChoiceTime = 0;

        function updateProgress() {
            loadedCount++;
            const percent = Math.round((loadedCount / totalAssets) * 100);
            document.getElementById('loader').innerText = percent + "%";
            
            // 超过 5 秒还没加载完，显示强制进入按钮
            if (percent >= 30) {
                document.getElementById('force-start').style.display = 'block';
            }

            if (loadedCount >= totalAssets) {
                initExperiment();
            }
        }

        function preload() {
            stimuli.forEach(item => {
                // 加载图片
                const img = new Image();
                img.onload = updateProgress;
                img.onerror = updateProgress; // 即使报错也继续，防止卡死
                img.src = `${imagePath}${item.name}.png`;
                
                // 加载音频 (移动端优化)
                const audio = new Audio();
                audio.oncanplaythrough = updateProgress;
                audio.onerror = updateProgress;
                audio.src = `${audioPath}${item.name}_Harm.wav`;
                audio.load(); // 显式调用加载
            });
        }

        function initExperiment() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('force-start').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('status-text').innerHTML = "资源就绪<br>点击白色方块开始试次";
        }

        function forceStart() {
            initExperiment();
        }

        // --- 核心逻辑部分 (保持 5s 延迟和 20 连对规则) ---
        const startBtn = document.getElementById('start-btn');
        const choiceGrid = document.getElementById('choice-grid');
        const feedback = document.getElementById('feedback');
        const statusText = document.getElementById('status-text');

        startBtn.onclick = function() {
            startBtn.style.display = 'none';
            statusText.innerText = "聆听声音...";
            currentTarget = stimuli[Math.floor(Math.random() * stimuli.length)];
            
            const audio = new Audio(`${audioPath}${currentTarget.name}_Harm.wav`);
            audio.play().catch(e => {
                console.log("音频播放被拦截，尝试静音播放一次以解锁权限");
            });

            audio.onended = () => {
                statusText.innerText = "延迟期 (5s)";
                setTimeout(() => { showChoices(); }, 5000);
            };
        };

        function showChoices() {
            choiceGrid.innerHTML = '';
            statusText.innerText = "请选择对应的图形";
            const displayOrder = [...stimuli].sort(() => Math.random() - 0.5);
            displayOrder.forEach(item => {
                const img = document.createElement('img');
                img.src = `${imagePath}${item.name}.png`;
                img.className = 'stimulus-img';
                img.onclick = () => handleChoice(item.id, item.name);
                choiceGrid.appendChild(img);
            });
            choiceGrid.style.display = 'grid';
            showChoiceTime = performance.now();
        }

        function handleChoice(selectedId, selectedName) {
            const rt = Math.round(performance.now() - showChoiceTime);
            choiceGrid.style.display = 'none';
            feedback.style.display = 'block';
            trialCount++;

            const isCorrect = (selectedId === currentTarget.id);
            if (isCorrect) {
                consecutiveCorrect++;
                feedback.innerHTML = '✔';
                feedback.className = 'correct';
            } else {
                consecutiveCorrect = 0;
                feedback.innerHTML = '✘';
                feedback.className = 'incorrect';
            }

            results.push({
                Trial: trialCount,
                Target_Name: currentTarget.name,
                Selected_Name: selectedName,
                Is_Correct: isCorrect ? 1 : 0,
                Consec_Correct: consecutiveCorrect,
                RT_ms: rt
            });

            if (consecutiveCorrect >= CRITERION) {
                statusText.innerText = `达标！连续做对 ${CRITERION} 次。`;
                exportToCSV();
                return;
            }

            setTimeout(() => {
                feedback.style.display = 'none';
                startBtn.style.display = 'block';
                statusText.innerText = `连对: ${consecutiveCorrect} | 点击继续`;
            }, 5000);
        }

        function exportToCSV() {
            let csv = "Trial,Target,Selected,Correct,Consec,RT\n";
            results.forEach(r => {
                csv += `${r.Trial},${r.Target_Name},${r.Selected_Name},${r.Is_Correct},${r.Consec_Correct},${r.RT_ms}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `data_trial_${trialCount}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = preload;
    </script>
</body>
</html>
