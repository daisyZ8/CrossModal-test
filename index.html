<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨模态关联实验 - 完整功能版</title>
    <style>
        body { margin: 0; background-color: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        #start-btn { width: 120px; height: 120px; background-color: white; cursor: pointer; display: none; box-shadow: 0 0 20px rgba(255,255,255,0.2); z-index: 10; border-radius: 10px; }
        #choice-grid { display: none; grid-template-columns: repeat(3, 100px); grid-gap: 15px; }
        .stimulus-img { width: 90px; height: 90px; cursor: pointer; border: 3px solid transparent; border-radius: 8px; }
        #feedback { display: none; position: absolute; pointer-events: none; z-index: 20; }
        #feedback-img { width: 85px; height: 85px; }
        #status-text { position: absolute; top: 10%; color: #aaa; text-align: center; width: 90%; font-size: 16px; line-height: 1.5; }
        #loader { font-size: 24px; color: #55acee; font-weight: bold; margin-bottom: 20px; }
        
        /* 按钮样式 */
        .control-btn { position: absolute; padding: 10px 15px; background: #333; color: #888; border: 1px solid #444; border-radius: 5px; cursor: pointer; font-size: 13px; z-index: 30; }
        #force-start { bottom: 80px; display: none; }
        #exit-btn { bottom: 20px; right: 20px; border-color: #552222; }
    </style>
</head>
<body>

    <div id="status-text">正在准备实验资源...</div>
    <div id="loader">0%</div>
    
    <button id="force-start" class="control-btn" onclick="initExperiment()">网络较慢？点击强制进入</button>
    <button id="exit-btn" class="control-btn" onclick="manualExit()">中途结束实验</button>
    
    <div id="start-btn"></div>
    <div id="choice-grid"></div>
    <div id="feedback"><img id="feedback-img" src="" alt="feedback"></div>

    <script>
        const audioPath = 'Auditory_Stimuli_Harmonics/'; 
        const imagePath = 'Visual_Stimuli_Balanced/';
        
        const stimuli = [
            { id: 1, name: 'S1_Circle_Blue' }, { id: 2, name: 'S2_Circle_Yellow' }, { id: 3, name: 'S3_Circle_Red' },
            { id: 4, name: 'S4_Square_Blue' }, { id: 5, name: 'S5_Square_Yellow' }, { id: 6, name: 'S6_Square_Red' },
            { id: 7, name: 'S7_Triangle_Blue' }, { id: 8, name: 'S8_Triangle_Yellow' }, { id: 9, name: 'S9_Triangle_Red' }
        ];

        let results = []; 
        let trialCount = 0;
        let consecutiveCorrect = 0;
        const CRITERION = 20;
        
        let loadedCount = 0;
        const totalAssets = stimuli.length * 2 + 2; 
        let currentTarget = null;
        let showChoiceTime = 0;

        function updateProgress() {
            loadedCount++;
            const percent = Math.round((loadedCount / totalAssets) * 100);
            document.getElementById('loader').innerText = percent + "%";
            if (percent >= 30) document.getElementById('force-start').style.display = 'block';
            if (loadedCount >= totalAssets) initExperiment();
        }

        function preload() {
            // 加载反馈图
            ['correct.png', 'incorrect.png'].forEach(src => {
                const img = new Image();
                img.onload = updateProgress; img.onerror = updateProgress;
                img.src = src;
            });
            // 加载刺激物
            stimuli.forEach(item => {
                const img = new Image();
                img.onload = updateProgress; img.onerror = updateProgress;
                img.src = `${imagePath}${item.name}.png`;
                const audio = new Audio();
                audio.oncanplaythrough = updateProgress; audio.onerror = updateProgress;
                audio.src = `${audioPath}${item.name}_Harm.wav`;
                audio.load();
            });
        }

        function initExperiment() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('force-start').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('status-text').innerHTML = "资源就绪<br>点击白色方块开始试次";
        }

        const startBtn = document.getElementById('start-btn');
        const choiceGrid = document.getElementById('choice-grid');
        const feedback = document.getElementById('feedback');
        const feedbackImg = document.getElementById('feedback-img');
        const statusText = document.getElementById('status-text');

        startBtn.onclick = function() {
            startBtn.style.display = 'none';
            statusText.innerText = "聆听声音刺激...";
            currentTarget = stimuli[Math.floor(Math.random() * stimuli.length)];
            const audio = new Audio(`${audioPath}${currentTarget.name}_Harm.wav`);
            audio.play();
            audio.onended = () => {
                statusText.innerText = "延迟期 (5s)";
                setTimeout(() => { showChoices(); }, 5000);
            };
        };

        function showChoices() {
            choiceGrid.innerHTML = '';
            statusText.innerText = "请选择对应的图形";
            const displayOrder = [...stimuli].sort(() => Math.random() - 0.5);
            displayOrder.forEach(item => {
                const img = document.createElement('img');
                img.src = `${imagePath}${item.name}.png`;
                img.className = 'stimulus-img';
                img.onclick = () => handleChoice(item.id, item.name);
                choiceGrid.appendChild(img);
            });
            choiceGrid.style.display = 'grid';
            showChoiceTime = performance.now();
        }

        function handleChoice(selectedId, selectedName) {
            const rt = Math.round(performance.now() - showChoiceTime);
            choiceGrid.style.display = 'none';
            const isCorrect = (selectedId === currentTarget.id);
            
            if (isCorrect) {
                consecutiveCorrect++;
                feedbackImg.src = 'correct.png';
            } else {
                consecutiveCorrect = 0;
                feedbackImg.src = 'incorrect.png';
            }
            feedback.style.display = 'block';

            results.push({
                Trial: ++trialCount,
                Target: currentTarget.name,
                Selected: selectedName,
                IsCorrect: isCorrect ? 1 : 0,
                ConsecCorrect: consecutiveCorrect,
                RT_ms: rt
            });

            if (consecutiveCorrect >= CRITERION) {
                statusText.innerText = "实验达标结束！";
                setTimeout(() => { exportToCSV(); }, 1000);
                return;
            }

            setTimeout(() => {
                feedback.style.display = 'none';
                startBtn.style.display = 'block';
                statusText.innerText = `当前连对: ${consecutiveCorrect} | 点击继续`;
            }, 5000);
        }

        // --- 中途退出功能 ---
        function manualExit() {
            if (confirm("确定要提前结束实验吗？")) {
                if (results.length > 0) {
                    if (confirm("是否下载已完成的实验数据？")) {
                        exportToCSV();
                    } else {
                        location.reload(); // 不下载则直接刷新页面重置
                    }
                } else {
                    alert("尚无实验数据。");
                    location.reload();
                }
            }
        }

        function exportToCSV() {
            if (results.length === 0) return;
            let csv = "\uFEFFTrial,Target,Selected,Correct,Consec,RT_ms\n";
            results.forEach(r => {
                csv += `${r.Trial},${r.Target},${r.Selected},${r.IsCorrect},${r.ConsecCorrect},${r.RT_ms}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Experiment_Data_Trial${trialCount}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            // 下载后告知用户
            setTimeout(() => {
                alert("数据已下载，实验进程已重置。");
                location.reload();
            }, 500);
        }

        window.onload = preload;
    </script>
</body>
</html>
